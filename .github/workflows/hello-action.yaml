name: hello world

on:
  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Show System Imformation
        run: |
          echo "Run multiple lines of code ${uname -a} ${uname -r}"
          echo "Current user is $(whoami)"
          echo "OS: $RUNNER_OS"
          echo "Kernel: $RUNNER_KERNEL"
          echo "Arch: $RUNNER_ARCH"

      - name: Run a one-line script
        run: echo "Hello world"

      - name: Show current date
        run: date
